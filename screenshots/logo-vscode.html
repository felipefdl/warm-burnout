<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=128, initial-scale=1">
<title>Warm Burnout - VS Code Logo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 128px;
    height: 128px;
    overflow: hidden;
    background: #1a1510;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Radial warm glow behind the logo */
  .glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(
      circle at center,
      rgba(184, 82, 46, 0.35) 0%,
      rgba(245, 197, 110, 0.12) 35%,
      transparent 70%
    );
  }

  /* Noise grain texture */
  .noise {
    position: absolute;
    inset: 0;
    opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 128px 128px;
  }

  /* Scanlines */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.06) 2px,
      rgba(0, 0, 0, 0.06) 4px
    );
    z-index: 3;
  }

  /* CRT vignette */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(
      circle at center,
      transparent 45%,
      rgba(0, 0, 0, 0.5) 100%
    );
    z-index: 2;
  }

  /* Logo */
  .logo {
    position: relative;
    z-index: 1;
    width: 72px;
    height: 72px;
    filter: drop-shadow(0 0 12px rgba(245, 197, 110, 0.4))
            drop-shadow(0 0 4px rgba(184, 82, 46, 0.3));
  }

  /* Subtle border glow */
  body::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 0;
    border: 1px solid rgba(184, 82, 46, 0.2);
    z-index: 4;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="noise"></div>
  <img src="../images/wb-logo.svg" class="logo" alt="">
  <div class="vignette"></div>
  <div class="scanlines"></div>
</body>
</html>
