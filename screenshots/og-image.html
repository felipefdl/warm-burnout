<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=1">
<title>Warm Burnout - OG Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #1a1510;
    font-family: "JetBrains Mono", monospace;
    color: #bfbdb6;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Noise grain */
  .noise {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
    z-index: 5;
  }

  /* Scanlines */
  .scanlines {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 6;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.025) 2px,
      rgba(0, 0, 0, 0.025) 4px
    );
  }

  /* Vignette */
  .vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 4;
    background: radial-gradient(
      ellipse at center,
      transparent 40%,
      rgba(0, 0, 0, 0.45) 100%
    );
  }

  /* Warm glow */
  .glow {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 700px;
    height: 500px;
    background: radial-gradient(
      ellipse,
      rgba(184, 82, 46, 0.14) 0%,
      rgba(245, 197, 110, 0.05) 45%,
      transparent 70%
    );
    z-index: 1;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .logo {
    width: 140px;
    height: 140px;
    margin-bottom: 24px;
    filter: drop-shadow(0 0 24px rgba(245, 197, 110, 0.25));
  }

  .title {
    font-size: 72px;
    font-weight: 700;
    color: #f5c56e;
    line-height: 1.05;
    margin-bottom: 20px;
  }

  .tagline {
    font-size: 20px;
    color: #b4a89c;
    line-height: 1.5;
    margin-bottom: 12px;
    max-width: 650px;
  }

  .brand-phrase {
    font-size: 15px;
    color: #6b665f;
    margin-bottom: 28px;
  }

  .badges {
    display: flex;
    gap: 8px;
  }

  .badge {
    padding: 5px 12px;
    border: 1px solid #2a2620;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    color: #6b665f;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .badge-accent {
    border-color: rgba(184, 82, 46, 0.4);
    color: #b8522e;
  }
</style>
</head>
<body>
  <div class="glow"></div>

  <div class="content">
    <img src="../images/wb-logo.svg" class="logo" alt="">
    <div class="title">Warm Burnout</div>
    <div class="tagline">The theme suite for developers who already burned out but still have deadlines.</div>
    <div class="brand-phrase">the ophthalmologist approves, probably</div>
    <div class="badges">
      <span class="badge badge-accent">WCAG AAA Dark</span>
      <span class="badge badge-accent">WCAG AA Light</span>
      <span class="badge">Multi-Platform</span>
      <span class="badge">Zero Blue Light</span>
    </div>
  </div>

  <div class="vignette"></div>
  <div class="noise"></div>
  <div class="scanlines"></div>
</body>
</html>
