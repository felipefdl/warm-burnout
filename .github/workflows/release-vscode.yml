name: Release VS Code Extension

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install Neovim
        run: |
          sudo apt-get update
          sudo apt-get install -y neovim

      - name: Check formatting
        run: cargo fmt -- --check

      - uses: extractions/setup-just@v3

      - name: Generate JetBrains theme files
        run: just jetbrains-build

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run theme validation tests
        run: cargo test --workspace

  release:
    needs: [validate]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Copy LICENSE into extension directory
        run: cp ../LICENSE LICENSE

      - name: Copy screenshots into extension directory
        run: cp -r ../screenshots screenshots

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Validate theme JSON
        run: |
          python3 -c "import json; json.load(open('themes/warm-burnout-dark.json'))"
          python3 -c "import json; json.load(open('themes/warm-burnout-light.json'))"

      - name: Package extension
        run: vsce package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "vscode/*.vsix"
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        if: vars.PUBLISH_MARKETPLACE == 'true'
        run: vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: vars.PUBLISH_OPENVSX == 'true'
        run: npx ovsx publish *.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
