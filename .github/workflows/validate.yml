name: Validate Themes

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install Neovim
        run: |
          sudo apt-get update
          sudo apt-get install -y neovim

      - name: Check formatting
        run: cargo fmt -- --check

      - uses: cargo-bins/cargo-binstall@main

      - name: Install rumdl
        # --force re-places the binary even when rust-cache restored the
        # binstall metadata (otherwise binstall short-circuits and the
        # binary itself is missing from $CARGO_HOME/bin).
        run: cargo binstall rumdl --version 0.1.84 --no-confirm --force

      - name: Check Markdown
        run: |
          rumdl fmt .
          git diff --exit-code
          rumdl check .

      - uses: extractions/setup-just@v3

      - name: Generate JetBrains theme files
        run: just jetbrains-build

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run theme validation tests
        run: cargo test --workspace
