# Warm Burnout Light -- tmux theme
# https://github.com/felipefdl/warm-burnout

# Status bar
set -g status-position bottom
set -g status-justify centre
set -g status-style "fg=#5a5244,bg=#EDE6DA"

# Status left: session name
set -g status-left " #S "
set -g status-left-length 20
set -g status-left-style "fg=#855700,bg=#EDE6DA"

# Status right: empty
set -g status-right ""
set -g status-right-length 0

# Window list
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "fg=#EDE6DA,bg=#924800,bold"
set -g window-status-style "fg=#5a5244,bg=#EDE6DA"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#DDD6CA"
set -g pane-active-border-style "fg=#b8522e"

# Messages
set -g message-style "fg=#3a3630,bg=#F0E8DC"
set -g message-command-style "fg=#3a3630,bg=#F0E8DC"

# Copy mode
set -g mode-style "fg=#F5EDE0,bg=#8a6600"

# Clock
set -g clock-mode-colour "#8a6600"
