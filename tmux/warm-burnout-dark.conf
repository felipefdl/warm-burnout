# Warm Burnout Dark -- tmux theme
# https://github.com/felipefdl/warm-burnout

# Status bar
set -g status-position bottom
set -g status-justify centre
set -g status-style "fg=#aea195,bg=#14120f"

# Status left: session name
set -g status-left " #S "
set -g status-left-length 20
set -g status-left-style "fg=#ffb454,bg=#14120f"

# Status right: empty
set -g status-right ""
set -g status-right-length 0

# Window list
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "fg=#14120f,bg=#ff8f40,bold"
set -g window-status-style "fg=#aea195,bg=#14120f"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#222018"
set -g pane-active-border-style "fg=#b8522e"

# Messages
set -g message-style "fg=#bfbdb6,bg=#1f1d17"
set -g message-command-style "fg=#bfbdb6,bg=#1f1d17"

# Copy mode
set -g mode-style "fg=#1a1510,bg=#f5c56e"

# Clock
set -g clock-mode-colour "#f5c56e"
